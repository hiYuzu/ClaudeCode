<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>飞行棋</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #f5f5f5;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: -apple-system, 'Segoe UI', 'Microsoft YaHei', sans-serif;
  color: #333;
  user-select: none;
}
#game-wrap {
  display: flex;
  align-items: flex-start;
  gap: 20px;
  transform: scale(1.1);
  transform-origin: center center;
}
#game-left {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
  width: 240px;
  flex-shrink: 0;
  padding: 28px 24px;
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
}
canvas { cursor: pointer; border-radius: 12px; }
#current-player {
  padding: 12px 18px;
  border-radius: 12px;
  font-weight: 700;
  font-size: 21px;
  color: #fff;
  transition: background 0.3s;
  width: 100%;
  text-align: center;
  white-space: nowrap;
  letter-spacing: 1px;
}
#dice {
  width: 80px; height: 80px;
  background: #f8f8f8;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 42px;
  color: #333;
  border: 2px solid #e0e0e0;
  transition: transform 0.2s;
}
#dice.rolling { animation: shake 0.1s infinite; }
@keyframes shake {
  0%,100% { transform: rotate(0deg); }
  25% { transform: rotate(8deg); }
  75% { transform: rotate(-8deg); }
}
#roll-btn {
  padding: 10px 0;
  border: none;
  border-radius: 10px;
  font-size: 19px;
  font-weight: 700;
  cursor: pointer;
  color: #fff;
  background: #5C6BC0;
  width: 100%;
  transition: all 0.15s;
  letter-spacing: 1px;
}
#roll-btn:hover:not(:disabled) { background: #3F51B5; transform: translateY(-1px); box-shadow: 0 3px 10px rgba(63,81,181,0.3); }
#roll-btn:disabled { opacity: 0.4; cursor: default; }
#restart-btn {
  padding: 10px 0;
  border: none;
  border-radius: 10px;
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
  color: #fff;
  background: #78909C;
  width: 100%;
  visibility: hidden;
  transition: all 0.15s;
}
#restart-btn:hover { background: #607D8B; transform: translateY(-1px); box-shadow: 0 3px 10px rgba(96,125,139,0.3); }
#msg { font-size: 14px; color: #888; min-height: 36px; text-align: center; line-height: 1.6; }
#game-log {
  width: 300px;
  height: 1020px;
  overflow-y: auto;
  background: #fff;
  border-radius: 16px;
  padding: 22px;
  flex-shrink: 0;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
}
#game-log::-webkit-scrollbar { width: 6px; }
#game-log::-webkit-scrollbar-track { background: transparent; }
#game-log::-webkit-scrollbar-thumb { background: #e0e0e0; border-radius: 3px; }
#game-log::-webkit-scrollbar-thumb:hover { background: #ccc; }
#log-title { font-size: 15px; font-weight: 700; color: #999; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 2px solid #f0f0f0; letter-spacing: 1px; }

/* Start screen */
#start-screen {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
}
#start-box {
  background: #fff;
  border-radius: 16px;
  padding: 48px 60px;
  text-align: center;
  min-width: 480px;
}
#start-box h1 {
  font-size: 48px;
  margin-bottom: 8px;
  color: #333;
  font-weight: 900;
}
#start-box .sub { color: #999; margin-bottom: 36px; font-size: 18px; }
#start-box label { display: block; margin-bottom: 14px; font-size: 20px; color: #666; }
.player-select {
  display: flex;
  gap: 14px;
  justify-content: center;
  margin-bottom: 32px;
}
.player-select button {
  width: 72px; height: 72px;
  border-radius: 12px;
  border: 2px solid #e0e0e0;
  background: #fff;
  color: #333;
  font-size: 30px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
}
.player-select button:hover { border-color: #5C6BC0; background: #f0f0ff; }
.player-select button.selected { border-color: #5C6BC0; background: #5C6BC0; color: #fff; }
#player-config {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 32px;
}
.player-row {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 18px;
  padding: 10px 16px;
  border-radius: 10px;
  background: #f8f8f8;
}
.player-dot {
  width: 20px; height: 20px;
  border-radius: 50%;
  flex-shrink: 0;
}
.player-row.ai-label { color: #aaa; }
.player-shape {
  width: 18px; height: 18px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: bold;
}
#start-btn {
  padding: 14px 64px;
  border: none;
  border-radius: 12px;
  font-size: 22px;
  font-weight: 700;
  cursor: pointer;
  color: #fff;
  background: #5C6BC0;
  transition: all 0.15s;
}
#start-btn:hover { background: #3F51B5; transform: scale(1.03); }
</style>
</head>
<body>

<div id="start-screen">
  <div id="start-box">
    <h1>飞行棋</h1>
    <div class="sub">选择玩家人数，开始游戏</div>
    <label>玩家人数</label>
    <div class="player-select" id="count-btns">
      <button onclick="setPlayerCount(1)">1</button>
      <button onclick="setPlayerCount(2)">2</button>
      <button onclick="setPlayerCount(3)">3</button>
      <button onclick="setPlayerCount(4)" class="selected">4</button>
    </div>
    <div id="player-config"></div>
    <button id="start-btn" onclick="startGame()">开始游戏</button>
  </div>
</div>

<div id="game-wrap">
  <div id="game-left">
    <div id="current-player">红方回合</div>
    <div id="dice">?</div>
    <div id="msg"></div>
    <button id="roll-btn" onclick="rollDice()">掷骰子</button>
    <button id="restart-btn" onclick="restartGame()">重新开始</button>
  </div>
  <canvas id="board" width="1020" height="1020"></canvas>
  <div id="game-log">
    <div id="log-title">游戏记录</div>
    <div id="log-entries"></div>
  </div>
</div>

<script>
const C = document.getElementById('board');
const ctx = C.getContext('2d');
const SIZE = 1020;

const COLORS = ['#E53935', '#FFB300', '#1E88E5', '#43A047'];
const LIGHT  = ['#FFCDD2', '#FFF8E1', '#BBDEFB', '#C8E6C9'];
const DARK   = ['#B71C1C', '#F57F17', '#0D47A1', '#1B5E20'];
const NAMES  = ['红方', '黄方', '蓝方', '绿方'];
const SHAPE_LABELS = ['●', '●', '●', '●'];
const DICE_DOTS = ['', '⚀','⚁','⚂','⚃','⚄','⚅'];

const TRACK = [];
const HOME_STRETCH = [[], [], [], []];
const BASE_POS = [[], [], [], []];

const N = 15, pad = 60;
const cs = (SIZE - 2 * pad) / (N - 1);
function q(c, r) { return { x: pad + c * cs, y: pad + r * cs }; }

// Build 52-position track clockwise
for (let r = 14; r >= 9; r--) TRACK.push(q(8, r));
for (let c = 9; c <= 14; c++) TRACK.push(q(c, 8));
TRACK.push(q(14,7), q(14,6));
for (let c = 13; c >= 9; c--) TRACK.push(q(c, 6));
for (let r = 5; r >= 0; r--) TRACK.push(q(8, r));
TRACK.push(q(7,0), q(6,0));
for (let r = 1; r <= 5; r++) TRACK.push(q(6, r));
for (let c = 5; c >= 0; c--) TRACK.push(q(c, 6));
TRACK.push(q(0,7), q(0,8));
for (let c = 1; c <= 5; c++) TRACK.push(q(c, 8));
for (let r = 9; r <= 14; r++) TRACK.push(q(6, r));
TRACK.push(q(7,14));

HOME_STRETCH[0] = [q(7,13), q(7,12), q(7,11), q(7,10), q(7,9), q(7,8)];
HOME_STRETCH[1] = [q(1,7), q(2,7), q(3,7), q(4,7), q(5,7), q(6,7)];
HOME_STRETCH[2] = [q(7,1), q(7,2), q(7,3), q(7,4), q(7,5), q(7,6)];
HOME_STRETCH[3] = [q(13,7), q(12,7), q(11,7), q(10,7), q(9,7), q(8,7)];

BASE_POS[0] = [q(10,11), q(12,11), q(10,13), q(12,13)];
BASE_POS[1] = [q(2,11), q(4,11), q(2,13), q(4,13)];
BASE_POS[2] = [q(2,1), q(4,1), q(2,3), q(4,3)];
BASE_POS[3] = [q(10,1), q(12,1), q(10,3), q(12,3)];

const LAUNCH_POS = [0, 39, 26, 13];

// --- Offscreen canvas for static board ---
const staticCvs = document.createElement('canvas');
staticCvs.width = staticCvs.height = SIZE;
const sctx = staticCvs.getContext('2d');
let staticDirty = true;

function drawStaticBoard() {
  const c = sctx;
  c.clearRect(0, 0, SIZE, SIZE);

  // Board background
  c.fillStyle = '#fafafa';
  c.fillRect(0, 0, SIZE, SIZE);

  // Cross shape
  c.fillStyle = '#f0f0f0';
  c.fillRect(pad - cs * 0.5, pad + 5.5 * cs, 15 * cs, 3 * cs);
  c.fillRect(pad + 5.5 * cs, pad - cs * 0.5, 3 * cs, 15 * cs);

  // Cross outline
  c.strokeStyle = '#e0e0e0';
  c.lineWidth = 2;
  c.strokeRect(pad - cs * 0.5, pad + 5.5 * cs, 15 * cs, 3 * cs);
  c.strokeRect(pad + 5.5 * cs, pad - cs * 0.5, 3 * cs, 15 * cs);

  // Track cells
  TRACK.forEach((pos, i) => {
    let fill = '#fff';
    let stroke = '#ddd';
    for (let p = 0; p < 4; p++) {
      if (i === LAUNCH_POS[p]) { fill = LIGHT[p]; stroke = COLORS[p]; break; }
    }
    c.fillStyle = fill;
    c.beginPath();
    c.arc(pos.x, pos.y, cs * 0.4, 0, Math.PI * 2);
    c.fill();
    c.strokeStyle = stroke;
    c.lineWidth = 2;
    c.stroke();
  });

  // Home stretches (skip index 5 — part of center)
  for (let p = 0; p < 4; p++) {
    HOME_STRETCH[p].forEach((pos, i) => {
      if (i === 5) return;
      c.fillStyle = LIGHT[p];
      c.beginPath();
      c.arc(pos.x, pos.y, cs * 0.4, 0, Math.PI * 2);
      c.fill();
      c.strokeStyle = COLORS[p];
      c.lineWidth = 2;
      c.stroke();
    });
  }

  // Base areas
  for (let p = 0; p < 4; p++) {
    const bc = {
      x: (BASE_POS[p][0].x + BASE_POS[p][3].x) / 2,
      y: (BASE_POS[p][0].y + BASE_POS[p][3].y) / 2
    };
    c.fillStyle = LIGHT[p];
    c.beginPath();
    c.arc(bc.x, bc.y, cs * 2.2, 0, Math.PI * 2);
    c.fill();
    c.strokeStyle = COLORS[p];
    c.lineWidth = 3;
    c.stroke();

    BASE_POS[p].forEach(pos => {
      c.fillStyle = '#fff';
      c.beginPath();
      c.arc(pos.x, pos.y, cs * 0.36, 0, Math.PI * 2);
      c.fill();
      c.strokeStyle = COLORS[p];
      c.lineWidth = 2;
      c.stroke();
    });

    c.fillStyle = COLORS[p];
    c.font = 'bold 17px sans-serif';
    c.textAlign = 'center';
    c.textBaseline = 'middle';
    const tag = isAI[p] ? ' AI' : '';
    c.fillText(NAMES[p] + tag, bc.x, bc.y - cs * 1.5);
    c.font = 'bold 14px sans-serif';
    c.fillText(SHAPE_LABELS[p], bc.x, bc.y - cs * 1.1);
  }

  // Center goal — 4 colored quadrants
  const ctr = q(7, 7);
  const cr = cs * 1.15;
  for (let p = 0; p < 4; p++) {
    const a = Math.PI * 0.25 + p * Math.PI * 0.5;
    c.fillStyle = COLORS[p];
    c.beginPath();
    c.moveTo(ctr.x, ctr.y);
    c.arc(ctr.x, ctr.y, cr, a, a + Math.PI * 0.5);
    c.closePath();
    c.fill();
  }
  c.strokeStyle = '#fff';
  c.lineWidth = 2;
  for (let i = 0; i < 4; i++) {
    const a = Math.PI * 0.25 + i * Math.PI * 0.5;
    c.beginPath();
    c.moveTo(ctr.x, ctr.y);
    c.lineTo(ctr.x + Math.cos(a) * cr, ctr.y + Math.sin(a) * cr);
    c.stroke();
  }
  c.strokeStyle = '#999';
  c.lineWidth = 3;
  c.beginPath();
  c.arc(ctr.x, ctr.y, cr, 0, Math.PI * 2);
  c.stroke();
  c.fillStyle = '#fff';
  c.beginPath();
  c.arc(ctr.x, ctr.y, cs * 0.38, 0, Math.PI * 2);
  c.fill();
  c.strokeStyle = '#999';
  c.lineWidth = 2;
  c.stroke();
  c.fillStyle = '#666';
  c.font = 'bold 22px sans-serif';
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  c.fillText('终', ctr.x, ctr.y);

  staticDirty = false;
}

// --- Game state ---
let humanCount = 4;
let isAI = [false, false, false, false];
let pieces = [];
let currentPlayer = 0;
let diceValue = 0;
let gamePhase = 'roll';
let movablePieces = [];

// Animation state
let anim = null;

function initPieces() {
  pieces = [];
  for (let p = 0; p < 4; p++) {
    pieces[p] = [];
    for (let i = 0; i < 4; i++)
      pieces[p][i] = { state: 'base', trackPos: -1, homePos: -1 };
  }
}

function setPlayerCount(n) {
  humanCount = n;
  document.querySelectorAll('#count-btns button').forEach((btn, i) => {
    btn.classList.toggle('selected', i + 1 === n);
  });
  renderPlayerConfig();
}

function renderPlayerConfig() {
  const box = document.getElementById('player-config');
  box.innerHTML = '';
  for (let p = 0; p < 4; p++) {
    const row = document.createElement('div');
    row.className = 'player-row' + (p >= humanCount ? ' ai-label' : '');
    row.innerHTML = `<span class="player-dot" style="background:${COLORS[p]}"></span>
      <span class="player-shape" style="color:${COLORS[p]}">${SHAPE_LABELS[p]}</span>
      <span>${NAMES[p]}</span>
      <span style="margin-left:auto;font-size:15px;color:${p < humanCount ? '#5C6BC0' : '#aaa'}">
        ${p < humanCount ? '玩家' : '电脑'}
      </span>`;
    box.appendChild(row);
  }
}

renderPlayerConfig();

function startGame() {
  isAI = [false, false, false, false];
  for (let i = humanCount; i < 4; i++) isAI[i] = true;
  document.getElementById('start-screen').style.display = 'none';
  initPieces();
  document.getElementById('log-entries').innerHTML = '';
  currentPlayer = 0;
  diceValue = 0;
  gamePhase = 'roll';
  anim = null;
  staticDirty = true;
  updatePlayerDisplay();
  drawBoard();
  setMsg(`${NAMES[0]}的回合，请掷骰子`);
  document.getElementById('roll-btn').disabled = false;
  if (isAI[0]) triggerAI();
}

function getPixelPos(player, pieceIdx) {
  const piece = pieces[player][pieceIdx];
  if (piece.state === 'base') return BASE_POS[player][pieceIdx];
  if (piece.state === 'done') return HOME_STRETCH[player][5];
  if (piece.state === 'home') return HOME_STRETCH[player][piece.homePos];
  return TRACK[piece.trackPos];
}

// --- Drawing ---
function drawPieceAt(p, x, y, r) {
  ctx.fillStyle = COLORS[p];
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 3;
  ctx.stroke();
}

function drawBoard() {
  if (staticDirty) drawStaticBoard();
  ctx.drawImage(staticCvs, 0, 0);

  const pr = cs * 0.38;

  const drawOrder = [];
  for (let o = 1; o <= 3; o++) drawOrder.push((currentPlayer + o) % 4);
  drawOrder.push(currentPlayer);

  for (const p of drawOrder) {
    for (let i = 0; i < 4; i++) {
      const piece = pieces[p][i];
      if (piece.state === 'done') continue;
      if (anim && anim.player === p && anim.idx === i) continue;

      const pos = getPixelPos(p, i);
      const movable = gamePhase === 'move' && movablePieces.includes(i) && p === currentPlayer;

      if (movable) {
        const pulse = 0.4 + 0.6 * Math.abs(Math.sin(performance.now() * 0.003));
        ctx.fillStyle = `rgba(255,235,59,${0.3 * pulse})`;
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, pr * 1.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = `rgba(255,193,7,${0.7 * pulse})`;
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, pr * 1.3, 0, Math.PI * 2);
        ctx.stroke();
      }

      drawPieceAt(p, pos.x, pos.y, pr);

      ctx.fillStyle = '#fff';
      ctx.font = `bold 16px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(i + 1, pos.x, pos.y + 1);
    }
  }

  // Pulse animation for movable pieces
  if (gamePhase === 'move' && !isAI[currentPlayer]) {
    requestAnimationFrame(() => drawBoard());
  }

  // Finished count in center quadrants
  for (let p = 0; p < 4; p++) {
    const cnt = pieces[p].filter(pc => pc.state === 'done').length;
    if (cnt > 0) {
      const angle = Math.PI * 0.5 + p * Math.PI * 0.5;
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 16px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(cnt, q(7,7).x + Math.cos(angle) * cs * 0.75,
                        q(7,7).y + Math.sin(angle) * cs * 0.75);
    }
  }
}

// --- Animation ---
function easeOut(t) { return 1 - (1 - t) * (1 - t); }

function runAnim() {
  if (!anim) return;
  const t = Math.min(1, (performance.now() - anim.start) / 180);
  const et = easeOut(t);

  drawBoard();

  const x = anim.fx + (anim.tx - anim.fx) * et;
  const y = anim.fy + (anim.ty - anim.fy) * et;
  const r = cs * 0.38;

  drawPieceAt(anim.player, x, y, r);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 16px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(anim.idx + 1, x, y + 1);

  if (t < 1) requestAnimationFrame(runAnim);
  else {
    const cb = anim.callback;
    anim = null;
    drawBoard();
    cb();
  }
}

function doAnimatedMove(player, pieceIdx, dice) {
  const from = getPixelPos(player, pieceIdx);
  applyMove(player, pieceIdx, dice);
  if (gamePhase === 'gameover') return;
  const to = getPixelPos(player, pieceIdx);
  anim = {
    player, idx: pieceIdx,
    fx: from.x, fy: from.y,
    tx: to.x, ty: to.y,
    start: performance.now(),
    callback: afterMove
  };
  requestAnimationFrame(runAnim);
}

// --- Dice ---
function rollDice() {
  if (gamePhase !== 'roll') return;
  gamePhase = 'animating';
  const diceEl = document.getElementById('dice');
  diceEl.classList.add('rolling');

  let count = 0;
  const interval = setInterval(() => {
    diceEl.textContent = DICE_DOTS[Math.ceil(Math.random() * 6)];
    if (++count > 4) {
      clearInterval(interval);
      diceValue = Math.ceil(Math.random() * 6);
      diceEl.textContent = DICE_DOTS[diceValue];
      diceEl.classList.remove('rolling');
      onDiceRolled();
    }
  }, 50);
}

function onDiceRolled() {
  const name = NAMES[currentPlayer] + (isAI[currentPlayer] ? '(电脑)' : '');
  setMsg(`${name}掷出了 ${diceValue} 点`);
  addLog(`${NAMES[currentPlayer]}掷出了 ${diceValue} 点`, currentPlayer);

  movablePieces = [];
  for (let i = 0; i < 4; i++) {
    if (canMove(currentPlayer, i, diceValue)) movablePieces.push(i);
  }

  if (movablePieces.length === 0) {
    setMsg(`${name}没有可移动的棋子，跳过回合`);
    addLog(`${NAMES[currentPlayer]}没有可移动的棋子`, currentPlayer);
    setTimeout(() => nextTurn(), 250);
    return;
  }

  if (movablePieces.length === 1 || isAI[currentPlayer]) {
    const pick = isAI[currentPlayer]
      ? aiPickPiece(currentPlayer, movablePieces, diceValue)
      : movablePieces[0];
    setTimeout(() => doAnimatedMove(currentPlayer, pick, diceValue),
               isAI[currentPlayer] ? 100 : 100);
    return;
  }

  gamePhase = 'move';
  setMsg(`${name}请点击要移动的棋子`);
  drawBoard();
}

// --- Move logic ---
function canMove(player, pieceIdx, dice) {
  const piece = pieces[player][pieceIdx];
  if (piece.state === 'done') return false;
  if (piece.state === 'base') return dice === 6;
  if (piece.state === 'home') return piece.homePos + dice <= 5;
  const stepsToHome = getStepsToHomeEntry(player, piece.trackPos);
  if (dice <= stepsToHome) return true;
  return (dice - stepsToHome - 1) <= 5;
}

function getStepsToHomeEntry(player, trackPos) {
  return ((LAUNCH_POS[player] + 51) % 52 - trackPos + 52) % 52;
}

function applyMove(player, pieceIdx, dice) {
  const piece = pieces[player][pieceIdx];

  if (piece.state === 'base') {
    piece.state = 'track';
    piece.trackPos = LAUNCH_POS[player];
    addLog(`${NAMES[player]}棋子${pieceIdx + 1}出仓`, player);
    checkCapture(player, pieceIdx);
    return;
  }

  if (piece.state === 'home') {
    piece.homePos += dice;
    if (piece.homePos >= 5) {
      piece.homePos = 5;
      piece.state = 'done';
      setMsg(`${NAMES[player]}的棋子到达终点！`);
      addLog(`${NAMES[player]}棋子${pieceIdx + 1}到达终点`, player);
      checkWin(player);
    }
    return;
  }

  const stepsToHome = getStepsToHomeEntry(player, piece.trackPos);
  if (dice <= stepsToHome) {
    piece.trackPos = (piece.trackPos + dice) % 52;
    addLog(`${NAMES[player]}棋子${pieceIdx + 1}前进${dice}步`, player);
    checkCapture(player, pieceIdx);
  } else {
    const homeSteps = dice - stepsToHome - 1;
    if (homeSteps === 5) {
      piece.state = 'done';
      piece.homePos = 5;
      setMsg(`${NAMES[player]}的棋子到达终点！`);
      addLog(`${NAMES[player]}棋子${pieceIdx + 1}到达终点`, player);
      checkWin(player);
    } else {
      piece.state = 'home';
      piece.homePos = homeSteps;
      addLog(`${NAMES[player]}棋子${pieceIdx + 1}进入终点跑道`, player);
    }
  }
}

function checkCapture(player, pieceIdx) {
  const piece = pieces[player][pieceIdx];
  if (piece.state !== 'track') return;
  for (let p = 0; p < 4; p++) {
    if (p === player) continue;
    for (let i = 0; i < 4; i++) {
      const other = pieces[p][i];
      if (other.state === 'track' && other.trackPos === piece.trackPos) {
        other.state = 'base';
        other.trackPos = -1;
        other.homePos = -1;
        setMsg(`${NAMES[player]}吃掉了${NAMES[p]}的棋子！`);
              addLog(`${NAMES[player]}吃掉了${NAMES[p]}的棋子`, player);
      }
    }
  }
}

function checkWin(player) {
  if (pieces[player].every(p => p.state === 'done')) {
    gamePhase = 'gameover';
    drawBoard();
    const label = isAI[player] ? `${NAMES[player]}(电脑)` : NAMES[player];
    setMsg(`${label}获胜！`);
    addLog(`${label}获胜！`, player);
    document.getElementById('roll-btn').disabled = true;
    document.getElementById('restart-btn').style.visibility = 'visible';
  }
}

function restartGame() {
  document.getElementById('restart-btn').style.visibility = 'hidden';
  document.getElementById('start-screen').style.display = 'flex';
}

function afterMove() {
  if (gamePhase === 'gameover') return;
  gamePhase = 'roll';
  movablePieces = [];

  if (diceValue === 6) {
    const name = NAMES[currentPlayer] + (isAI[currentPlayer] ? '(电脑)' : '');
    setMsg(`${name}掷出6点，再掷一次！`);
    addLog(`${NAMES[currentPlayer]}掷出6点，再来一次`, currentPlayer);
    drawBoard();
    if (isAI[currentPlayer]) {
      document.getElementById('roll-btn').disabled = true;
      setTimeout(() => triggerAI(), 150);
    } else {
      document.getElementById('roll-btn').disabled = false;
    }
  } else {
    nextTurn();
  }
}

function nextTurn() {
  currentPlayer = (currentPlayer + 1) % 4;
  diceValue = 0;
  gamePhase = 'roll';
  updatePlayerDisplay();
  document.getElementById('dice').textContent = '?';
  drawBoard();

  const name = NAMES[currentPlayer] + (isAI[currentPlayer] ? '(电脑)' : '');
  setMsg(`${name}的回合`);
  document.getElementById('roll-btn').disabled = isAI[currentPlayer];

  if (isAI[currentPlayer]) {
    setTimeout(() => triggerAI(), 150);
  }
}

function updatePlayerDisplay() {
  const el = document.getElementById('current-player');
  const label = NAMES[currentPlayer] + (isAI[currentPlayer] ? ' AI' : '');
  el.textContent = `${label}回合`;
  el.style.background = COLORS[currentPlayer];
}

function setMsg(text) {
  document.getElementById('msg').textContent = text;
}

function addLog(text, p) {
  const el = document.getElementById('log-entries');
  const d = document.createElement('div');
  const color = p !== undefined ? COLORS[p] : '#999';
  d.style.cssText = 'padding:6px 10px;font-size:13px;line-height:1.6;border-radius:8px;margin-bottom:3px;border-left:3px solid ' + color + ';background:' + (p !== undefined ? color + '08' : '#f8f8f8') + ';';
  d.style.color = color;
  d.style.fontWeight = '500';
  d.textContent = text;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

// --- AI ---
function triggerAI() {
  if (gamePhase !== 'roll') return;
  rollDice();
}

function aiPickPiece(player, options, dice) {
  let best = options[0];
  let bestScore = -Infinity;

  for (const idx of options) {
    const piece = pieces[player][idx];
    let score = 0;

    if (piece.state === 'base') {
      score = 50;
      const launchTrack = LAUNCH_POS[player];
      for (let p = 0; p < 4; p++) {
        if (p === player) continue;
        for (let j = 0; j < 4; j++) {
          if (pieces[p][j].state === 'track' && pieces[p][j].trackPos === launchTrack)
            score += 100;
        }
      }
    } else if (piece.state === 'home') {
      const nh = piece.homePos + dice;
      score = nh === 5 ? 200 : (80 + nh * 5);
    } else if (piece.state === 'track') {
      const sth = getStepsToHomeEntry(player, piece.trackPos);
      if (dice > sth) {
        const hs = dice - sth - 1;
        score = hs === 5 ? 200 : (120 + hs * 5);
      } else {
        const ntp = (piece.trackPos + dice) % 52;
        let cap = false;
        for (let p = 0; p < 4; p++) {
          if (p === player) continue;
          for (let j = 0; j < 4; j++)
            if (pieces[p][j].state === 'track' && pieces[p][j].trackPos === ntp) cap = true;
        }
        if (cap) score = 150;
        score = Math.max(score, 30 + (51 - sth));
        for (let p = 0; p < 4; p++) {
          if (p === player) continue;
          for (let j = 0; j < 4; j++) {
            const o = pieces[p][j];
            if (o.state === 'track') {
              const d = (piece.trackPos - o.trackPos + 52) % 52;
              if (d > 0 && d <= 6) score += 40;
            }
          }
        }
      }
    }

    if (score > bestScore) { bestScore = score; best = idx; }
  }
  return best;
}

// --- Input ---
C.addEventListener('click', function(e) {
  if (gamePhase !== 'move' || isAI[currentPlayer]) return;
  const rect = C.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (SIZE / rect.width);
  const my = (e.clientY - rect.top) * (SIZE / rect.height);

  for (const idx of movablePieces) {
    const pos = getPixelPos(currentPlayer, idx);
    const dx = mx - pos.x, dy = my - pos.y;
    if (dx * dx + dy * dy < (cs * 0.5) * (cs * 0.5)) {
      doAnimatedMove(currentPlayer, idx, diceValue);
      return;
    }
  }
});

document.addEventListener('keydown', function(e) {
  if (e.code === 'Space' && gamePhase === 'roll' && !isAI[currentPlayer]) {
    e.preventDefault();
    rollDice();
  }
});

initPieces();
drawBoard();
</script>
