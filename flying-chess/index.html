<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>飞行棋</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Microsoft YaHei', sans-serif;
  color: #fff;
  user-select: none;
}
#game-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
}
canvas { cursor: pointer; border-radius: 16px; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
#info {
  display: flex;
  align-items: center;
  gap: 30px;
  font-size: 27px;
}
#current-player {
  padding: 10px 28px;
  border-radius: 24px;
  font-weight: bold;
  transition: background 0.3s;
}
#dice-area {
  display: flex;
  align-items: center;
  gap: 18px;
}
#dice {
  width: 84px; height: 84px;
  background: #fff;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 42px;
  font-weight: bold;
  color: #333;
  transition: transform 0.2s;
}
#dice.rolling { animation: shake 0.1s infinite; }
@keyframes shake {
  0%,100% { transform: rotate(0deg); }
  25% { transform: rotate(10deg); }
  75% { transform: rotate(-10deg); }
}
#roll-btn {
  padding: 12px 36px;
  border: none;
  border-radius: 24px;
  font-size: 24px;
  font-weight: bold;
  cursor: pointer;
  color: #fff;
  background: #C8102E;
  transition: all 0.2s;
}
#roll-btn:hover:not(:disabled) { transform: scale(1.05); background: #E8304E; }
#roll-btn:disabled { opacity: 0.5; cursor: default; }
#restart-btn {
  padding: 12px 36px;
  border: none;
  border-radius: 24px;
  font-size: 24px;
  font-weight: bold;
  cursor: pointer;
  color: #fff;
  background: #007040;
  display: none;
}
#msg { font-size: 21px; color: #ccc; min-height: 28px; text-align: center; }
#start-screen {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.88);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
}
#start-box {
  background: #16213e;
  border-radius: 24px;
  padding: 60px 72px;
  text-align: center;
  box-shadow: 0 0 80px rgba(0,0,0,0.5);
  min-width: 540px;
}
#start-box h1 {
  font-size: 54px;
  margin-bottom: 12px;
  background: linear-gradient(135deg, #CC0000, #B8860B, #0050A0, #007040);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
#start-box .sub { color: #999; margin-bottom: 40px; font-size: 21px; }
#start-box label { display: block; margin-bottom: 16px; font-size: 24px; color: #ccc; }
.player-select {
  display: flex;
  gap: 18px;
  justify-content: center;
  margin-bottom: 36px;
}
.player-select button {
  width: 90px; height: 90px;
  border-radius: 18px;
  border: 3px solid #333;
  background: #1a1a2e;
  color: #fff;
  font-size: 36px;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.2s;
}
.player-select button:hover { border-color: #C8102E; background: #2a2a4e; }
.player-select button.selected { border-color: #C8102E; background: #C8102E; }
#player-config {
  display: flex;
  flex-direction: column;
  gap: 14px;
  margin-bottom: 36px;
}
.player-row {
  display: flex;
  align-items: center;
  gap: 14px;
  font-size: 22px;
  padding: 12px 18px;
  border-radius: 12px;
  background: #1a1a2e;
}
.player-dot {
  width: 24px; height: 24px;
  border-radius: 50%;
  flex-shrink: 0;
  border: 2px solid rgba(255,255,255,0.3);
}
.player-row.ai-label { color: #888; font-style: italic; }
.player-shape {
  width: 20px; height: 20px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: bold;
}
#start-btn {
  padding: 18px 72px;
  border: none;
  border-radius: 28px;
  font-size: 27px;
  font-weight: bold;
  cursor: pointer;
  color: #fff;
  background: linear-gradient(135deg, #C8102E, #9B0C23);
  transition: all 0.2s;
}
#start-btn:hover { transform: scale(1.05); }
</style>
</head>
<body>

<div id="start-screen">
  <div id="start-box">
    <h1>飞行棋</h1>
    <div class="sub">选择玩家人数，开始游戏</div>
    <label>玩家人数</label>
    <div class="player-select" id="count-btns">
      <button onclick="setPlayerCount(1)">1</button>
      <button onclick="setPlayerCount(2)">2</button>
      <button onclick="setPlayerCount(3)">3</button>
      <button onclick="setPlayerCount(4)" class="selected">4</button>
    </div>
    <div id="player-config"></div>
    <button id="start-btn" onclick="startGame()">开始游戏</button>
  </div>
</div>

<div id="game-wrap">
  <canvas id="board" width="1020" height="1020"></canvas>
  <div id="info">
    <div id="current-player">红方回合</div>
    <div id="dice-area">
      <div id="dice">?</div>
      <button id="roll-btn" onclick="rollDice()">掷骰子</button>
      <button id="restart-btn" onclick="restartGame()">重新开始</button>
    </div>
  </div>
  <div id="msg"></div>
</div>

<script>
const C = document.getElementById('board');
const ctx = C.getContext('2d');
const SIZE = 1020;

const COLORS = ['#CC0000', '#B8860B', '#0050A0', '#007040'];
const LIGHT  = ['#FFB3B3', '#FFE4B5', '#B8D4F0', '#B0E0CC'];
const DARK   = COLORS.map(c => {
  const r = Math.max(0, parseInt(c.slice(1,3),16) - 50);
  const g = Math.max(0, parseInt(c.slice(3,5),16) - 50);
  const b = Math.max(0, parseInt(c.slice(5,7),16) - 50);
  return `rgb(${r},${g},${b})`;
});
const NAMES  = ['红方', '黄方', '蓝方', '绿方'];
const SHAPE_LABELS = ['●', '◆', '■', '▲'];
const DICE_DOTS = ['', '⚀','⚁','⚂','⚃','⚄','⚅'];

const TRACK = [];
const HOME_STRETCH = [[], [], [], []];
const BASE_POS = [[], [], [], []];

const N = 15, pad = 60;
const cs = (SIZE - 2 * pad) / (N - 1);
function q(c, r) { return { x: pad + c * cs, y: pad + r * cs }; }

// Build 52-position track clockwise
for (let r = 14; r >= 9; r--) TRACK.push(q(8, r));
for (let c = 9; c <= 14; c++) TRACK.push(q(c, 8));
TRACK.push(q(14,7), q(14,6));
for (let c = 13; c >= 9; c--) TRACK.push(q(c, 6));
for (let r = 5; r >= 0; r--) TRACK.push(q(8, r));
TRACK.push(q(7,0), q(6,0));
for (let r = 1; r <= 5; r++) TRACK.push(q(6, r));
for (let c = 5; c >= 0; c--) TRACK.push(q(c, 6));
TRACK.push(q(0,7), q(0,8));
for (let c = 1; c <= 5; c++) TRACK.push(q(c, 8));
for (let r = 9; r <= 14; r++) TRACK.push(q(6, r));
TRACK.push(q(7,14));

HOME_STRETCH[0] = [q(7,13), q(7,12), q(7,11), q(7,10), q(7,9), q(7,8)];
HOME_STRETCH[1] = [q(1,7), q(2,7), q(3,7), q(4,7), q(5,7), q(6,7)];
HOME_STRETCH[2] = [q(7,1), q(7,2), q(7,3), q(7,4), q(7,5), q(7,6)];
HOME_STRETCH[3] = [q(13,7), q(12,7), q(11,7), q(10,7), q(9,7), q(8,7)];

BASE_POS[0] = [q(10,11), q(12,11), q(10,13), q(12,13)];
BASE_POS[1] = [q(2,11), q(4,11), q(2,13), q(4,13)];
BASE_POS[2] = [q(2,1), q(4,1), q(2,3), q(4,3)];
BASE_POS[3] = [q(10,1), q(12,1), q(10,3), q(12,3)];

const LAUNCH_POS = [0, 39, 26, 13];

// --- Offscreen canvas for static board ---
const staticCvs = document.createElement('canvas');
staticCvs.width = staticCvs.height = SIZE;
const sctx = staticCvs.getContext('2d');
let staticDirty = true;

function drawStaticBoard() {
  const c = sctx;
  c.clearRect(0, 0, SIZE, SIZE);

  // Background
  c.fillStyle = '#f0e6d3';
  c.fillRect(0, 0, SIZE, SIZE);

  // Cross shape
  c.fillStyle = '#e8dcc8';
  c.fillRect(pad, pad + 6 * cs, 14 * cs + cs, 3 * cs);
  c.fillRect(pad + 6 * cs, pad, 3 * cs, 14 * cs + cs);

  // Track cells
  TRACK.forEach((pos, i) => {
    let color = '#fff';
    for (let p = 0; p < 4; p++) {
      if (i === LAUNCH_POS[p]) { color = LIGHT[p]; break; }
    }
    c.fillStyle = color;
    c.beginPath();
    c.arc(pos.x, pos.y, cs * 0.38, 0, Math.PI * 2);
    c.fill();
    c.strokeStyle = '#999';
    c.lineWidth = 1.5;
    c.stroke();
  });

  // Home stretches
  for (let p = 0; p < 4; p++) {
    HOME_STRETCH[p].forEach((pos, i) => {
      c.fillStyle = LIGHT[p];
      c.beginPath();
      c.arc(pos.x, pos.y, cs * 0.38, 0, Math.PI * 2);
      c.fill();
      c.strokeStyle = COLORS[p];
      c.lineWidth = 2;
      c.stroke();
      if (i === 5) {
        c.fillStyle = COLORS[p];
        c.font = 'bold 21px sans-serif';
        c.textAlign = 'center';
        c.textBaseline = 'middle';
        c.fillText('★', pos.x, pos.y);
      }
    });
  }

  // Base areas
  for (let p = 0; p < 4; p++) {
    const bc = {
      x: (BASE_POS[p][0].x + BASE_POS[p][3].x) / 2,
      y: (BASE_POS[p][0].y + BASE_POS[p][3].y) / 2
    };
    c.fillStyle = LIGHT[p] + '99';
    c.beginPath();
    c.arc(bc.x, bc.y, cs * 2.2, 0, Math.PI * 2);
    c.fill();
    c.strokeStyle = COLORS[p];
    c.lineWidth = 3;
    c.stroke();

    BASE_POS[p].forEach(pos => {
      c.fillStyle = '#fff';
      c.beginPath();
      c.arc(pos.x, pos.y, cs * 0.35, 0, Math.PI * 2);
      c.fill();
      c.strokeStyle = COLORS[p] + '88';
      c.lineWidth = 1.5;
      c.stroke();
    });

    c.fillStyle = COLORS[p];
    c.font = 'bold 18px sans-serif';
    c.textAlign = 'center';
    c.textBaseline = 'middle';
    const tag = isAI[p] ? ' AI' : '';
    c.fillText(NAMES[p] + tag, bc.x, bc.y - cs * 1.5);
    c.font = 'bold 14px sans-serif';
    c.fillText(SHAPE_LABELS[p], bc.x, bc.y - cs * 1.1);
  }

  // Center goal
  c.fillStyle = '#ffd700';
  c.beginPath();
  c.arc(q(7,7).x, q(7,7).y, cs * 0.8, 0, Math.PI * 2);
  c.fill();
  c.strokeStyle = '#B8860B';
  c.lineWidth = 2;
  c.stroke();
  c.fillStyle = '#333';
  c.font = 'bold 24px sans-serif';
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  c.fillText('终', q(7,7).x, q(7,7).y);

  staticDirty = false;
}

// --- Game state ---
let humanCount = 4;
let isAI = [false, false, false, false];
let pieces = [];
let currentPlayer = 0;
let diceValue = 0;
let gamePhase = 'roll';
let movablePieces = [];

// Animation state
let anim = null; // { player, idx, fx, fy, tx, ty, start }

function initPieces() {
  pieces = [];
  for (let p = 0; p < 4; p++) {
    pieces[p] = [];
    for (let i = 0; i < 4; i++)
      pieces[p][i] = { state: 'base', trackPos: -1, homePos: -1 };
  }
}

function setPlayerCount(n) {
  humanCount = n;
  document.querySelectorAll('#count-btns button').forEach((btn, i) => {
    btn.classList.toggle('selected', i + 1 === n);
  });
  renderPlayerConfig();
}

function renderPlayerConfig() {
  const box = document.getElementById('player-config');
  box.innerHTML = '';
  for (let p = 0; p < 4; p++) {
    const row = document.createElement('div');
    row.className = 'player-row' + (p >= humanCount ? ' ai-label' : '');
    row.innerHTML = `<span class="player-dot" style="background:${COLORS[p]}"></span>
      <span class="player-shape" style="color:${COLORS[p]}">${SHAPE_LABELS[p]}</span>
      <span>${NAMES[p]}</span>
      <span style="margin-left:auto;font-size:18px;color:${p < humanCount ? '#4CAF50' : '#888'}">
        ${p < humanCount ? '玩家' : '电脑'}
      </span>`;
    box.appendChild(row);
  }
}

renderPlayerConfig();

function startGame() {
  isAI = [false, false, false, false];
  for (let i = humanCount; i < 4; i++) isAI[i] = true;
  document.getElementById('start-screen').style.display = 'none';
  initPieces();
  currentPlayer = 0;
  diceValue = 0;
  gamePhase = 'roll';
  anim = null;
  staticDirty = true;
  updatePlayerDisplay();
  drawBoard();
  setMsg(`${NAMES[0]}的回合，请掷骰子`);
  document.getElementById('roll-btn').disabled = false;
  if (isAI[0]) triggerAI();
}

function getPixelPos(player, pieceIdx) {
  const piece = pieces[player][pieceIdx];
  if (piece.state === 'base') return BASE_POS[player][pieceIdx];
  if (piece.state === 'done') return HOME_STRETCH[player][5];
  if (piece.state === 'home') return HOME_STRETCH[player][piece.homePos];
  return TRACK[piece.trackPos];
}

// --- Drawing ---
function drawPieceAt(p, x, y, r) {
  ctx.fillStyle = COLORS[p];
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = DARK[p];
  ctx.lineWidth = 2;
  ctx.stroke();
}

function drawBoard() {
  if (staticDirty) drawStaticBoard();
  ctx.drawImage(staticCvs, 0, 0);

  const pr = cs * 0.38;

  // Pieces — draw current player last (on top)
  const drawOrder = [];
  for (let o = 1; o <= 3; o++) drawOrder.push((currentPlayer + o) % 4);
  drawOrder.push(currentPlayer);

  for (const p of drawOrder) {
    for (let i = 0; i < 4; i++) {
      const piece = pieces[p][i];
      if (piece.state === 'done') continue;

      // Skip animated piece (drawn separately in animation loop)
      if (anim && anim.player === p && anim.idx === i) continue;

      const pos = getPixelPos(p, i);
      const movable = gamePhase === 'move' && movablePieces.includes(i) && p === currentPlayer;

      if (movable) {
        ctx.fillStyle = '#FFD70088';
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, pr * 1.4, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#FFD700';
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      drawPieceAt(p, pos.x, pos.y, pr);

      ctx.fillStyle = '#fff';
      ctx.font = 'bold 17px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(i + 1, pos.x, pos.y + 1);
    }
  }

  // Finished count near center
  for (let p = 0; p < 4; p++) {
    const cnt = pieces[p].filter(pc => pc.state === 'done').length;
    if (cnt > 0) {
      const angle = (p * Math.PI / 2) - Math.PI / 4;
      ctx.fillStyle = COLORS[p];
      ctx.font = 'bold 15px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(cnt, q(7,7).x + Math.cos(angle) * cs * 0.55,
                        q(7,7).y + Math.sin(angle) * cs * 0.55);
    }
  }
}

// --- Animation ---
function easeOut(t) { return 1 - (1 - t) * (1 - t); }

function runAnim() {
  if (!anim) return;
  const t = Math.min(1, (performance.now() - anim.start) / 180);
  const et = easeOut(t);

  drawBoard();

  const x = anim.fx + (anim.tx - anim.fx) * et;
  const y = anim.fy + (anim.ty - anim.fy) * et;
  const r = cs * 0.38;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath();
  ctx.arc(x + 3, y + 3, r, 0, Math.PI * 2);
  ctx.fill();

  drawPieceAt(anim.player, x, y, r);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 17px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(anim.idx + 1, x, y + 1);

  if (t < 1) requestAnimationFrame(runAnim);
  else {
    const cb = anim.callback;
    anim = null;
    drawBoard();
    cb();
  }
}

function doAnimatedMove(player, pieceIdx, dice) {
  const from = getPixelPos(player, pieceIdx);

  applyMove(player, pieceIdx, dice);

  if (gamePhase === 'gameover') return;

  const to = getPixelPos(player, pieceIdx);
  anim = {
    player, idx: pieceIdx,
    fx: from.x, fy: from.y,
    tx: to.x, ty: to.y,
    start: performance.now(),
    callback: afterMove
  };
  requestAnimationFrame(runAnim);
}

// --- Dice ---
function rollDice() {
  if (gamePhase !== 'roll') return;
  gamePhase = 'animating';
  const diceEl = document.getElementById('dice');
  diceEl.classList.add('rolling');

  let count = 0;
  const interval = setInterval(() => {
    diceEl.textContent = DICE_DOTS[Math.ceil(Math.random() * 6)];
    if (++count > 7) {
      clearInterval(interval);
      diceValue = Math.ceil(Math.random() * 6);
      diceEl.textContent = DICE_DOTS[diceValue];
      diceEl.classList.remove('rolling');
      onDiceRolled();
    }
  }, 80);
}

function onDiceRolled() {
  const name = NAMES[currentPlayer] + (isAI[currentPlayer] ? '(电脑)' : '');
  setMsg(`${name}掷出了 ${diceValue} 点`);

  movablePieces = [];
  for (let i = 0; i < 4; i++) {
    if (canMove(currentPlayer, i, diceValue)) movablePieces.push(i);
  }

  if (movablePieces.length === 0) {
    setMsg(`${name}没有可移动的棋子，跳过回合`);
    setTimeout(() => nextTurn(), 800);
    return;
  }

  if (movablePieces.length === 1 || isAI[currentPlayer]) {
    const pick = isAI[currentPlayer]
      ? aiPickPiece(currentPlayer, movablePieces, diceValue)
      : movablePieces[0];
    setTimeout(() => doAnimatedMove(currentPlayer, pick, diceValue),
               isAI[currentPlayer] ? 250 : 150);
    return;
  }

  gamePhase = 'move';
  setMsg(`${name}请点击要移动的棋子`);
  drawBoard();
}

// --- Move logic (state only, no afterMove) ---
function canMove(player, pieceIdx, dice) {
  const piece = pieces[player][pieceIdx];
  if (piece.state === 'done') return false;
  if (piece.state === 'base') return dice === 6;
  if (piece.state === 'home') return piece.homePos + dice <= 5;
  const stepsToHome = getStepsToHomeEntry(player, piece.trackPos);
  if (dice <= stepsToHome) return true;
  return (dice - stepsToHome - 1) <= 5;
}

function getStepsToHomeEntry(player, trackPos) {
  return ((LAUNCH_POS[player] + 51) % 52 - trackPos + 52) % 52;
}

function applyMove(player, pieceIdx, dice) {
  const piece = pieces[player][pieceIdx];

  if (piece.state === 'base') {
    piece.state = 'track';
    piece.trackPos = LAUNCH_POS[player];
    checkCapture(player, pieceIdx);
    return;
  }

  if (piece.state === 'home') {
    piece.homePos += dice;
    if (piece.homePos >= 5) {
      piece.homePos = 5;
      piece.state = 'done';
      setMsg(`${NAMES[player]}的棋子到达终点！`);
      checkWin(player);
    }
    return;
  }

  const stepsToHome = getStepsToHomeEntry(player, piece.trackPos);
  if (dice <= stepsToHome) {
    piece.trackPos = (piece.trackPos + dice) % 52;
    checkCapture(player, pieceIdx);
  } else {
    const homeSteps = dice - stepsToHome - 1;
    if (homeSteps === 5) {
      piece.state = 'done';
      piece.homePos = 5;
      setMsg(`${NAMES[player]}的棋子到达终点！`);
      checkWin(player);
    } else {
      piece.state = 'home';
      piece.homePos = homeSteps;
    }
  }
}

function checkCapture(player, pieceIdx) {
  const piece = pieces[player][pieceIdx];
  if (piece.state !== 'track') return;
  for (let p = 0; p < 4; p++) {
    if (p === player) continue;
    for (let i = 0; i < 4; i++) {
      const other = pieces[p][i];
      if (other.state === 'track' && other.trackPos === piece.trackPos) {
        other.state = 'base';
        other.trackPos = -1;
        other.homePos = -1;
        setMsg(`${NAMES[player]}吃掉了${NAMES[p]}的棋子！`);
      }
    }
  }
}

function checkWin(player) {
  if (pieces[player].every(p => p.state === 'done')) {
    gamePhase = 'gameover';
    drawBoard();
    const label = isAI[player] ? `${NAMES[player]}(电脑)` : NAMES[player];
    setMsg(`${label}获胜！`);
    document.getElementById('roll-btn').disabled = true;
    document.getElementById('restart-btn').style.display = 'inline-block';
  }
}

function restartGame() {
  document.getElementById('restart-btn').style.display = 'none';
  document.getElementById('start-screen').style.display = 'flex';
}

function afterMove() {
  if (gamePhase === 'gameover') return;
  gamePhase = 'roll';
  movablePieces = [];

  if (diceValue === 6) {
    const name = NAMES[currentPlayer] + (isAI[currentPlayer] ? '(电脑)' : '');
    setMsg(`${name}掷出6点，再掷一次！`);
    drawBoard();
    if (isAI[currentPlayer]) {
      document.getElementById('roll-btn').disabled = true;
      setTimeout(() => triggerAI(), 300);
    } else {
      document.getElementById('roll-btn').disabled = false;
    }
  } else {
    nextTurn();
  }
}

function nextTurn() {
  currentPlayer = (currentPlayer + 1) % 4;
  diceValue = 0;
  gamePhase = 'roll';
  updatePlayerDisplay();
  document.getElementById('dice').textContent = '?';
  drawBoard();

  const name = NAMES[currentPlayer] + (isAI[currentPlayer] ? '(电脑)' : '');
  setMsg(`${name}的回合`);
  document.getElementById('roll-btn').disabled = isAI[currentPlayer];

  if (isAI[currentPlayer]) {
    setTimeout(() => triggerAI(), 350);
  }
}

function updatePlayerDisplay() {
  const el = document.getElementById('current-player');
  const label = NAMES[currentPlayer] + (isAI[currentPlayer] ? ' AI' : '');
  el.textContent = `${label}回合`;
  el.style.background = COLORS[currentPlayer];
}

function setMsg(text) {
  document.getElementById('msg').textContent = text;
}

// --- AI ---
function triggerAI() {
  if (gamePhase !== 'roll') return;
  rollDice();
}

function aiPickPiece(player, options, dice) {
  let best = options[0];
  let bestScore = -Infinity;

  for (const idx of options) {
    const piece = pieces[player][idx];
    let score = 0;

    if (piece.state === 'base') {
      score = 50;
      const launchTrack = LAUNCH_POS[player];
      for (let p = 0; p < 4; p++) {
        if (p === player) continue;
        for (let j = 0; j < 4; j++) {
          if (pieces[p][j].state === 'track' && pieces[p][j].trackPos === launchTrack)
            score += 100;
        }
      }
    } else if (piece.state === 'home') {
      const nh = piece.homePos + dice;
      score = nh === 5 ? 200 : (80 + nh * 5);
    } else if (piece.state === 'track') {
      const sth = getStepsToHomeEntry(player, piece.trackPos);
      if (dice > sth) {
        const hs = dice - sth - 1;
        score = hs === 5 ? 200 : (120 + hs * 5);
      } else {
        const ntp = (piece.trackPos + dice) % 52;
        let cap = false;
        for (let p = 0; p < 4; p++) {
          if (p === player) continue;
          for (let j = 0; j < 4; j++)
            if (pieces[p][j].state === 'track' && pieces[p][j].trackPos === ntp) cap = true;
        }
        if (cap) score = 150;
        score = Math.max(score, 30 + (51 - sth));
        for (let p = 0; p < 4; p++) {
          if (p === player) continue;
          for (let j = 0; j < 4; j++) {
            const o = pieces[p][j];
            if (o.state === 'track') {
              const d = (piece.trackPos - o.trackPos + 52) % 52;
              if (d > 0 && d <= 6) score += 40;
            }
          }
        }
      }
    }

    if (score > bestScore) { bestScore = score; best = idx; }
  }
  return best;
}

// --- Input ---
C.addEventListener('click', function(e) {
  if (gamePhase !== 'move' || isAI[currentPlayer]) return;
  const rect = C.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (SIZE / rect.width);
  const my = (e.clientY - rect.top) * (SIZE / rect.height);

  for (const idx of movablePieces) {
    const pos = getPixelPos(currentPlayer, idx);
    const dx = mx - pos.x, dy = my - pos.y;
    if (dx * dx + dy * dy < (cs * 0.5) * (cs * 0.5)) {
      doAnimatedMove(currentPlayer, idx, diceValue);
      return;
    }
  }
});

document.addEventListener('keydown', function(e) {
  if (e.code === 'Space' && gamePhase === 'roll' && !isAI[currentPlayer]) {
    e.preventDefault();
    rollDice();
  }
});

initPieces();
drawBoard();
</script>
